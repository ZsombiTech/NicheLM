name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test + qc
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync (dev extras only — no GPU/eval deps in CI)
        run: uv sync --extra dev

      - name: Lint (ruff check + format check)
        run: make lint

      - name: Tests (pytest)
        run: make test

      - name: Quality check (fixtures)
        run: uv run python -m data.quality_check --fixture
